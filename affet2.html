<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Beni Özlemedin mi EFEmmm</title>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
text-align:center;
height:100vh;
overflow:hidden;
margin:0;
}

h1{
margin-top:120px;
font-size:40px;
color:white;
}

p{
font-size:20px;
color:white;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
margin:20px;
cursor:pointer;
transition:0.3s;
}

#evet{
background:#ff4d6d;
color:white;
}

#evet:hover{
transform:scale(1.1);
}

#hayir{
background:#444;
color:white;
position:absolute;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

#mesaj{
display:none;
font-size:30px;
color:white;
margin-top:40px;
}

</style>
</head>

<body>

<h1>Beni Affeder misin? 🥺</h1>

<p>Seni üzdüysem özür dilerim bebişim...</p>
<p>Sana çok aşığım ❤️</p>

<button id="evet" onclick="evetTikla()">Evet ❤️</button>
<button id="hayir" onmouseover="kac()">Hayır</button>

<div id="mesaj">
🎉 YES BEEEE MMMWWAHHH 🎉<br>
Beni affettiğin için teşekkür ederim ❤️
</div>

<script>

function evetTikla(){
document.getElementById("mesaj").style.display="block";
}

function kac(){

let btn=document.getElementById("hayir");

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-100);

btn.style.left=x+"px";
btn.style.top=y+"px";

}

function kalpOlustur(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(kalpOlustur,300);

</script>

</body>
</html>
